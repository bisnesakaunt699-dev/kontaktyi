<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;

/* анимированный фон */
background: linear-gradient(-45deg,#1d2b64,#f8cdda,#2c5364,#0f2027);
background-size:400% 400%;
animation: bgmove 12s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* центрирование секции */
#contacts{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* «куб» (карточка) */
.contact-box{
background:rgba(0,0,0,0.65);
padding:40px;
border-radius:20px;
width:400px;
box-shadow:0 0 25px rgba(0,0,0,0.7);
transition:0.4s;
}

/* лёгкая анимация при наведении */
.contact-box:hover{
transform:scale(1.05);
box-shadow:0 0 35px rgba(255,255,255,0.3);
}

.contact-box a{
color:#4da6ff;
text-decoration:none;
}
</style>
